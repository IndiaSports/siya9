<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Queen Siya - IPL Predictions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }
        
        .font-display {
            font-family: 'Cinzel', serif;
        }

        /* Animated Gradient Background */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a2c4e 0%, #050505 70%);
            overflow: hidden;
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 { width: 400px; height: 400px; background: #0ea5e9; top: -100px; left: -100px; animation-duration: 12s; }
        .blob-2 { width: 300px; height: 300px; background: #6366f1; bottom: -50px; right: -50px; animation-duration: 15s; animation-delay: 2s; }
        .blob-3 { width: 200px; height: 200px; background: #ec4899; top: 40%; left: 60%; animation-duration: 8s; animation-delay: 1s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Profile Image Glow */
        .profile-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
        }

        .profile-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, #0ea5e9, #6366f1, transparent);
            animation: spin 4s linear infinite;
            opacity: 0.7;
            filter: blur(5px);
        }

        .profile-img {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Text Effects */
        .text-glow {
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
        }

        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Button Effects */
        .luxury-btn {
            background: linear-gradient(90deg, #0ea5e9, #6366f1);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .luxury-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        
        .luxury-btn:hover::before {
            left: 100%;
        }

        .luxury-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.6);
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
        }

        /* Holographic UI Lines */
        .holo-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.5), transparent);
            width: 100%;
            margin: 1rem 0;
        }
        
        .corner-accent {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(14, 165, 233, 0.5);
            transition: all 0.3s ease;
        }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .glass-card:hover .corner-accent {
            width: 30px;
            height: 30px;
            border-color: #0ea5e9;
        }

    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

                    <div class="flex items-center gap-3">

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />

                    </div>
                    <span class="text-green-400 text-xs font-bold bg-green-400/10 px-2 py-1 rounded">COMPLETED</span>
                </div>

                <div class="bg-black/20 rounded-xl p-4 border border-white/5 flex items-center justify-between group/item hover:bg-white/5 transition-colors">
                    <div class="flex items-center gap-3">

                    </div>

            </div>

            <div class="holo-line"></div>

            <!-- CTA Section -->

                        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.962 6.502-1.359 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.123-2.678-1.799-1.185-.781-.417-1.21.258-1.911.177-.184 3.247-2.977 3.307-3.23.007-.032.015-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.481-.428-.009-1.252-.242-1.865-.442-.751-.244-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.015 3.333-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.141.121.099.154.232.17.325.015.093.034.305.019.471z"/>

        </div>
        
        <!-- Footer -->
        <div class="text-center mt-8 opacity-40">
            <p class="text-[10px] uppercase tracking-[0.3em]">Cricket Analytics © 2026</p>
        </div>

    </main>

    <!-- Particle Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                createParticle();
            }

            function createParticle() {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random size
                const size = Math.random() * 3 + 1;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Random position
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.top = `${Math.random() * 100}vh`;
                
                // Random animation duration
                const duration = Math.random() * 10 + 10;
                particle.style.transition = `top ${duration}s linear, opacity ${duration}s ease-in-out`;
                
                body.appendChild(particle);

                // Animate
                setTimeout(() => {
                    particle.style.top = '-10px';
                    particle.style.opacity = '0';
                }, 100);

                // Reset after animation
                setTimeout(() => {
                    particle.remove();
                    createParticle();
                }, duration * 1000);
            }
        });
    </script>
</body>
</html>
